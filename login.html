<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#063d1f">
<title>A8玩家 · 登录</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:'Songti SC','STSong','Noto Serif SC',serif;color:#f5ecd4;
    background:radial-gradient(ellipse 120% 120% at 50% 40%,#117a3e 0%,#0a5a2e 55%,#063d1f 100%);}
  .card{width:90%;max-width:340px;background:rgba(10,5,2,0.55);border:1.5px solid #d4af37;
    border-radius:16px;padding:28px 24px;box-shadow:0 8px 40px rgba(0,0,0,0.5);}
  .logo{text-align:center;font-size:34px;font-weight:700;color:#f4d76a;letter-spacing:2px;margin-bottom:4px;
    text-shadow:0 2px 8px rgba(0,0,0,0.5);}
  .sub{text-align:center;font-size:12px;color:#c4b890;margin-bottom:22px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:#d4af37;margin-bottom:5px;}
  .field input{width:100%;padding:11px 12px;border-radius:9px;border:1px solid rgba(212,175,55,0.4);
    background:rgba(0,0,0,0.35);color:#f5ecd4;font-size:15px;font-family:inherit;}
  .field input:focus{outline:none;border-color:#f4d76a;}
  .btn{width:100%;margin-top:8px;padding:12px;border:none;border-radius:9px;cursor:pointer;
    background:linear-gradient(180deg,#d4af37,#8a6f1f);color:#1a0f00;font-size:16px;font-weight:700;
    font-family:inherit;letter-spacing:2px;}
  .btn:active{filter:brightness(1.15);}
  .btn:disabled{opacity:0.6;}
  .msg{margin-top:14px;text-align:center;font-size:13px;min-height:18px;color:#ff8a8a;}
  .msg.ok{color:#5ed16a;}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">A8玩家</div>
    <div class="sub">请输入账号密码登录</div>
    <div class="field"><label>账号</label><input id="u" type="text" autocomplete="username" placeholder="账号"></div>
    <div class="field"><label>密码</label><input id="p" type="password" autocomplete="current-password" placeholder="密码"></div>
    <button class="btn" id="go">登 录</button>
    <div class="msg" id="msg"></div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  /* ====== 改这里: 填你的 Supabase 地址和 anon key(与轮盘/百家乐同一个项目, 直接复制过来) ====== */
  const SUPABASE_URL = 'https://tutbopofnvehjofscnom.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_1GZtvCsNlQFn2Xyi5cE9_Q_Sp87vKB9';
  /* ================================================================================== */

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const $ = id => document.getElementById(id);
  function show(t, ok){ const m=$('msg'); m.textContent=t; m.className='msg'+(ok?' ok':''); }

  // 设备ID: 本机生成一次, 长期保存
  function deviceId(){
    let d = localStorage.getItem('a8_device');
    if(!d){ d = 'd_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('a8_device', d); }
    return d;
  }

  async function login(){
    const u = $('u').value.trim(), p = $('p').value.trim();
    if(!u || !p){ show('请输入账号和密码'); return; }
    $('go').disabled = true; show('登录中…');
    try{
      const { data, error } = await sb.from('a8_users').select('*').eq('username', u).limit(1);
      if(error) throw error;
      const user = data && data[0];
      if(!user || user.password !== p){ show('账号或密码错误'); $('go').disabled=false; return; }
      if(user.status === 'disabled'){ show('账号已停用, 请联系管理员'); $('go').disabled=false; return; }
      if(user.expire_at && new Date(user.expire_at) < new Date()){ show('账号已到期, 请联系管理员续期'); $('go').disabled=false; return; }

      const dev = deviceId();
      if(!user.device_id){
        // 首次登录, 绑定本机
        const { error: e2 } = await sb.from('a8_users').update({ device_id: dev }).eq('id', user.id);
        if(e2) throw e2;
      } else if(user.device_id !== dev){
        show('此账号已绑定其他设备, 请联系管理员解绑'); $('go').disabled=false; return;
      }

      localStorage.setItem('a8_session', JSON.stringify({ username: u, device: dev, ts: Date.now() }));
      show('登录成功, 正在进入…', true);
      setTimeout(()=> location.replace('index.html'), 500);
    }catch(err){
      show('网络或服务器错误, 请重试');
      $('go').disabled = false;
    }
  }
  $('go').addEventListener('click', login);
  $('p').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
</script>
</body>
</html>
